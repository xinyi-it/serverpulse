<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServerPulse - 实时服务器监控</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header .subtitle {
            color: #aaa;
            font-size: 1rem;
        }
        .system-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .info-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .info-card .label {
            color: #888;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-card .value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #00d2ff;
            margin-top: 5px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }
        .card-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #00d2ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .metric-name {
            color: #aaa;
        }
        .metric-value {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-top: 5px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .cpu-fill { background: linear-gradient(90deg, #00d2ff, #3a7bd5); }
        .memory-fill { background: linear-gradient(90deg, #f953c6, #b91d73); }
        .disk-fill { background: linear-gradient(90deg, #11998e, #38ef7d); }
        .swap-fill { background: linear-gradient(90deg, #fc4a1a, #f7b733); }
        .chart-container {
            position: relative;
            height: 200px;
            margin-top: 10px;
        }
        .process-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .process-table th,
        .process-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .process-table th {
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }
        .process-table tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        .process-name {
            color: #00d2ff;
            font-weight: 500;
        }
        .process-user {
            color: #aaa;
            font-size: 0.85rem;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        .status-online { background: #38ef7d; }
        .status-warning { background: #f7b733; }
        .status-critical { background: #fc4a1a; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .last-update {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            margin-top: 20px;
        }
        .cores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 5px;
            margin-top: 10px;
        }
        .core-item {
            text-align: center;
            padding: 5px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            font-size: 0.75rem;
        }
        .core-value {
            font-weight: 600;
            color: #00d2ff;
        }
        .core-label {
            color: #888;
            font-size: 0.65rem;
        }
        .network-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .network-item {
            text-align: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }
        .network-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #00d2ff;
        }
        .network-label {
            color: #888;
            font-size: 0.8rem;
            margin-top: 5px;
        }
        .timestamp {
            color: #666;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ServerPulse</h1>
        <div class="subtitle">
            <span class="status-dot status-online" id="statusDot"></span>
            实时服务器监控仪表盘
        </div>
    </div>

    <div class="system-info" id="systemInfo"></div>

    <div class="dashboard">
        <div class="card">
            <div class="card-title">CPU 使用率</div>
            <div class="metric">
                <span class="metric-name">总体使用率</span>
                <span class="metric-value" id="cpuTotal">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill cpu-fill" id="cpuBar" style="width: 0%"></div>
            </div>
            <div class="chart-container">
                <canvas id="cpuChart"></canvas>
            </div>
            <div class="card-title" style="margin-top: 15px; font-size: 0.9rem;">CPU 核心</div>
            <div class="cores-grid" id="cpuCores"></div>
        </div>

        <div class="card">
            <div class="card-title">内存使用</div>
            <div class="metric">
                <span class="metric-name">物理内存</span>
                <span class="metric-value" id="memoryPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill memory-fill" id="memoryBar" style="width: 0%"></div>
            </div>
            <div class="metric">
                <span class="metric-name">已使用 / 总量</span>
                <span class="metric-value" id="memoryUsed">0 GB / 0 GB</span>
            </div>
            <div class="metric">
                <span class="metric-name">交换分区</span>
                <span class="metric-value" id="swapPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill swap-fill" id="swapBar" style="width: 0%"></div>
            </div>
            <div class="chart-container">
                <canvas id="memoryChart"></canvas>
            </div>
        </div>

        <div class="card">
            <div class="card-title">磁盘使用</div>
            <div class="metric">
                <span class="metric-name">根分区使用率</span>
                <span class="metric-value" id="diskPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill disk-fill" id="diskBar" style="width: 0%"></div>
            </div>
            <div class="metric">
                <span class="metric-name">已使用</span>
                <span class="metric-value" id="diskUsed">0 GB</span>
            </div>
            <div class="metric">
                <span class="metric-name">可用</span>
                <span class="metric-value" id="diskFree">0 GB</span>
            </div>
            <div class="metric">
                <span class="metric-name">总容量</span>
                <span class="metric-value" id="diskTotal">0 GB</span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">网络流量</div>
            <div class="network-stats">
                <div class="network-item">
                    <div class="network-value" id="netSent">0 B</div>
                    <div class="network-label">发送</div>
                </div>
                <div class="network-item">
                    <div class="network-value" id="netRecv">0 B</div>
                    <div class="network-label">接收</div>
                </div>
                <div class="network-item">
                    <div class="network-value" id="packetsSent">0</div>
                    <div class="network-label">发送包</div>
                </div>
                <div class="network-item">
                    <div class="network-value" id="packetsRecv">0</div>
                    <div class="network-label">接收包</div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="networkChart"></canvas>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Top 10 进程 (按 CPU 排序)</div>
        <table class="process-table">
            <thead>
                <tr>
                    <th>PID</th>
                    <th>进程名</th>
                    <th>用户</th>
                    <th>CPU %</th>
                    <th>内存 %</th>
                </tr>
            </thead>
            <tbody id="processList"></tbody>
        </table>
    </div>

    <div class="last-update">
        最后更新: <span id="lastUpdate">--:--:--</span>
        <span class="timestamp" id="timestamp"></span>
    </div>

    <script>
        const MAX_HISTORY = 30;
        let cpuHistory = [];
        let memoryHistory = [];
        let networkSentHistory = [];
        let networkRecvHistory = [];
        let lastNetSent = 0;
        let lastNetRecv = 0;
        let labels = [];

        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        function createChart(ctx, label, color) {
            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: [],
                        borderColor: color,
                        backgroundColor: color + '20',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: { 
                            display: false,
                            grid: { display: false }
                        },
                        y: {
                            min: 0,
                            max: 100,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { 
                                color: '#666',
                                callback: v => v + '%'
                            }
                        }
                    },
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    }
                }
            });
        }

        function createNetworkChart(ctx) {
            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '发送',
                            data: [],
                            borderColor: '#00d2ff',
                            backgroundColor: 'rgba(0, 210, 255, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0
                        },
                        {
                            label: '接收',
                            data: [],
                            borderColor: '#38ef7d',
                            backgroundColor: 'rgba(56, 239, 125, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { 
                            display: true,
                            labels: { color: '#888' }
                        }
                    },
                    scales: {
                        x: { display: false },
                        y: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { 
                                color: '#666',
                                callback: v => formatBytes(v) + '/s'
                            }
                        }
                    }
                }
            });
        }

        const cpuChart = createChart(
            document.getElementById('cpuChart').getContext('2d'),
            'CPU 使用率',
            '#00d2ff'
        );

        const memoryChart = createChart(
            document.getElementById('memoryChart').getContext('2d'),
            '内存使用率',
            '#f953c6'
        );

        const networkChart = createNetworkChart(
            document.getElementById('networkChart').getContext('2d')
        );

        function updateSystemInfo(system) {
            const container = document.getElementById('systemInfo');
            container.innerHTML = `
                <div class="info-card">
                    <div class="label">主机名</div>
                    <div class="value">${system.hostname}</div>
                </div>
                <div class="info-card">
                    <div class="label">操作系统</div>
                    <div class="value">${system.os}</div>
                </div>
                <div class="info-card">
                    <div class="label">Python 版本</div>
                    <div class="value">${system.python_version}</div>
                </div>
                <div class="info-card">
                    <div class="label">运行时间</div>
                    <div class="value">${system.uptime}</div>
                </div>
                <div class="info-card">
                    <div class="label">启动时间</div>
                    <div class="value">${system.boot_time}</div>
                </div>
            `;
        }

        function updateCPU(cpu) {
            document.getElementById('cpuTotal').textContent = cpu.total + '%';
            document.getElementById('cpuBar').style.width = cpu.total + '%';
            
            const coresContainer = document.getElementById('cpuCores');
            coresContainer.innerHTML = cpu.cores.map((usage, i) => `
                <div class="core-item">
                    <div class="core-value">${usage}%</div>
                    <div class="core-label">核心 ${i}</div>
                </div>
            `).join('');

            cpuHistory.push(cpu.total);
            if (cpuHistory.length > MAX_HISTORY) cpuHistory.shift();
            cpuChart.data.datasets[0].data = [...cpuHistory];
            cpuChart.update('none');
        }

        function updateMemory(memory) {
            document.getElementById('memoryPercent').textContent = memory.percent + '%';
            document.getElementById('memoryBar').style.width = memory.percent + '%';
            document.getElementById('memoryUsed').textContent = 
                `${formatBytes(memory.used)} / ${formatBytes(memory.total)}`;
            document.getElementById('swapPercent').textContent = memory.swap_percent + '%';
            document.getElementById('swapBar').style.width = memory.swap_percent + '%';

            memoryHistory.push(memory.percent);
            if (memoryHistory.length > MAX_HISTORY) memoryHistory.shift();
            memoryChart.data.datasets[0].data = [...memoryHistory];
            memoryChart.update('none');
        }

        function updateDisk(disk) {
            document.getElementById('diskPercent').textContent = disk.percent + '%';
            document.getElementById('diskBar').style.width = disk.percent + '%';
            document.getElementById('diskUsed').textContent = formatBytes(disk.used);
            document.getElementById('diskFree').textContent = formatBytes(disk.free);
            document.getElementById('diskTotal').textContent = formatBytes(disk.total);
        }

        function updateNetwork(network) {
            document.getElementById('netSent').textContent = formatBytes(network.bytes_sent);
            document.getElementById('netRecv').textContent = formatBytes(network.bytes_recv);
            document.getElementById('packetsSent').textContent = network.packets_sent.toLocaleString();
            document.getElementById('packetsRecv').textContent = network.packets_recv.toLocaleString();

            if (lastNetSent > 0) {
                const sentRate = network.bytes_sent - lastNetSent;
                const recvRate = network.bytes_recv - lastNetRecv;
                networkSentHistory.push(sentRate);
                networkRecvHistory.push(recvRate);
                if (networkSentHistory.length > MAX_HISTORY) {
                    networkSentHistory.shift();
                    networkRecvHistory.shift();
                }
                networkChart.data.datasets[0].data = [...networkSentHistory];
                networkChart.data.datasets[1].data = [...networkRecvHistory];
                networkChart.update('none');
            }
            lastNetSent = network.bytes_sent;
            lastNetRecv = network.bytes_recv;
        }

        function updateProcesses(processes) {
            const tbody = document.getElementById('processList');
            tbody.innerHTML = processes.map(proc => `
                <tr>
                    <td>${proc.pid}</td>
                    <td class="process-name">${proc.name}</td>
                    <td class="process-user">${proc.user}</td>
                    <td>${proc.cpu}%</td>
                    <td>${proc.memory}%</td>
                </tr>
            `).join('');
        }

        function updateStatusDot(cpuPercent) {
            const dot = document.getElementById('statusDot');
            if (cpuPercent > 90) {
                dot.className = 'status-dot status-critical';
            } else if (cpuPercent > 70) {
                dot.className = 'status-dot status-warning';
            } else {
                dot.className = 'status-dot status-online';
            }
        }

        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();

                labels.push(data.timestamp);
                if (labels.length > MAX_HISTORY) labels.shift();

                updateSystemInfo(data.system);
                updateCPU(data.cpu);
                updateMemory(data.memory);
                updateDisk(data.disk);
                updateNetwork(data.network);
                updateProcesses(data.processes);
                updateStatusDot(data.cpu.total);

                document.getElementById('lastUpdate').textContent = data.timestamp;
                document.getElementById('timestamp').textContent = 
                    ' | 数据刷新间隔: 3秒';
            } catch (error) {
                console.error('获取数据失败:', error);
                document.getElementById('statusDot').className = 'status-dot status-critical';
            }
        }

        fetchStats();
        setInterval(fetchStats, 3000);
    </script>
</body>
</html>
